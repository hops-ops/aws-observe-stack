apiVersion: aws.hops.ops.com.ai/v1alpha1
kind: ObserveStack
metadata:
  name: observe
  namespace: default
spec:
  clusterName: production-cluster
  namespace: monitoring
  labels:
    team: platform
  kubePrometheusStack:
    storage:
      size: 10Gi
  loki:
    storage:
      type: pvc
      size: 10Gi
  tempo:
    storage:
      type: pvc
      size: 10Gi
  k8sMonitoring:
    values:
      opencost:
        enabled: true
  aws:
    region: us-west-2
    rolePrefix: prod-
    tags:
      environment: production
