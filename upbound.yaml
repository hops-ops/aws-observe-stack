apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: aws-observe-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/observe-stack
    version: '>=v0.8.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/aws-pod-identity
    version: '>=v0.9.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-s3
    version: '>=v2.5.0'
  description: Deploys the ObserveStack with AWS Pod Identity for OpenCost billing
    access.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # aws-observe-stack

    Deploys the Observe stack (Prometheus, Loki, Tempo, k8s-monitoring/OpenCost,
    Grafana) with AWS Pod Identity for OpenCost billing access.
  repository: ghcr.io/hops-ops/aws-observe-stack
  source: github.com/hops-ops/aws-observe-stack
