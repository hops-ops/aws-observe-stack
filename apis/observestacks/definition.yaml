apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: observestacks.aws.hops.ops.com.ai
spec:
  group: aws.hops.ops.com.ai
  names:
    kind: ObserveStack
    plural: observestacks
  scope: Namespaced
  defaultCompositeDeletePolicy: Foreground
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: ObserveStack deploys the observability stack with AWS Pod Identity for OpenCost billing access.
        type: object
        properties:
          spec:
            description: ObserveStackSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used for provider config defaults and resource naming.
                type: string
              managementPolicies:
                description: Management policies for all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels applied to all managed resources.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              helmProviderConfigRef:
                description: Reference to the Helm ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    description: Name of the Helm ProviderConfig.
                    type: string
                  kind:
                    description: Kind of the ProviderConfig. Defaults to ProviderConfig.
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              kubernetesProviderConfigRef:
                description: Reference to the Kubernetes ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    description: Name of the Kubernetes ProviderConfig.
                    type: string
                  kind:
                    description: Kind of the ProviderConfig. Defaults to ProviderConfig.
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              awsProviderConfigRef:
                description: Reference to the AWS ProviderConfig. Defaults to "default".
                type: object
                properties:
                  name:
                    description: Name of the AWS ProviderConfig.
                    type: string
                  kind:
                    description: Kind of the ProviderConfig. Defaults to ProviderConfig.
                    type: string
              prettyNames:
                description: |
                  When true, overrides in-cluster resource names to be short and clean
                  (e.g. "grafana" instead of "kube-prometheus-stack-grafana") and removes
                  redundant "-pod-identity" suffixes from PodIdentity XR names.
                  WARNING: Enabling on an existing install is a breaking change — service
                  names, PVCs, and cross-component wiring will change, causing resource
                  recreation. Recommended for fresh installs only.
                type: boolean
                default: false
              namespace:
                description: Shared namespace for all components. Defaults to monitoring.
                type: string
              storageClassDefaults:
                description: Default StorageClass settings used when components use storage.type=pvc.
                type: object
                properties:
                  create:
                    description: Whether to create StorageClass resources by default.
                    type: boolean
                    default: true
                  provisioner:
                    description: StorageClass provisioner.
                    type: string
                    default: ebs.csi.eks.amazonaws.com
                  parameters:
                    description: StorageClass parameters map.
                    type: object
                    additionalProperties:
                      type: string
                    x-kubernetes-preserve-unknown-fields: true
                  allowVolumeExpansion:
                    description: Whether PVC expansion is allowed.
                    type: boolean
                    default: true
                  reclaimPolicy:
                    description: StorageClass reclaim policy.
                    type: string
                    enum:
                    - Delete
                    - Retain
                    default: Delete
                  volumeBindingMode:
                    description: StorageClass volume binding mode.
                    type: string
                    enum:
                    - Immediate
                    - WaitForFirstConsumer
                    default: WaitForFirstConsumer
              nodePool:
                description: Optional dedicated Karpenter NodePool for observe workloads. When enabled, non-daemonset pods are scheduled to a dedicated NodePool via nodeSelector and tolerations. Daemonsets (node-exporter, alloy) continue to run on all nodes.
                type: object
                properties:
                  enabled:
                    description: Whether to create a dedicated NodePool for observe workloads. Defaults to false.
                    type: boolean
                    default: false
                  nodeClassName:
                    description: Name of the EKS NodeClass to reference. Defaults to the EKS Auto Mode default.
                    type: string
                  limits:
                    description: Karpenter NodePool resource limits. Defaults to cpu/memory-based limits for dynamic scaling. Set nodes to cap node count.
                    type: object
                    properties:
                      cpu:
                        description: Maximum total vCPUs across all nodes. Defaults to "40".
                        type: string
                        default: "40"
                      memory:
                        description: Maximum total memory across all nodes. Defaults to "160Gi".
                        type: string
                        default: "160Gi"
                      nodes:
                        description: Maximum number of nodes. Optional — omit for pure resource-based scaling.
                        type: integer
                  requirements:
                    description: Karpenter NodePool scheduling requirements. Defaults to broad spot instance selection.
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          - Gt
                          - Lt
                        values:
                          type: array
                          items:
                            type: string
                      required:
                      - key
                      - operator
                  disruption:
                    description: Karpenter disruption settings.
                    type: object
                    properties:
                      consolidationPolicy:
                        description: Consolidation policy. Defaults to WhenEmptyOrUnderutilized.
                        type: string
                        enum:
                        - WhenEmpty
                        - WhenEmptyOrUnderutilized
                        default: WhenEmptyOrUnderutilized
                      consolidateAfter:
                        description: Duration to wait before consolidating. Defaults to 60s.
                        type: string
                        default: "60s"
              aws:
                description: AWS account and IAM configuration.
                type: object
                properties:
                  region:
                    description: AWS region for the EKS cluster.
                    type: string
                  permissionsBoundaryArn:
                    description: ARN of the IAM permissions boundary to apply to the role.
                    type: string
                  rolePrefix:
                    description: Prefix for the IAM role name.
                    type: string
                  tags:
                    description: Custom tags applied to AWS resources.
                    type: object
                    additionalProperties:
                      type: string
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - region
              kubePrometheusStack:
                description: Configuration for the kube-prometheus-stack component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to kube-prometheus-stack.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values merged with chart and cross-component defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  storage:
                    description: Storage configuration for Prometheus.
                    type: object
                    properties:
                      retentionDays:
                        description: Retention period in days for metric data.
                        type: integer
                        default: 30
                      size:
                        description: Requested PVC size for Prometheus.
                        type: string
                        default: 10Gi
                      storageClass:
                        description: StorageClass settings for Prometheus PVCs.
                        type: object
                        properties:
                          name:
                            description: StorageClass name for Prometheus PVCs.
                            type: string
                            default: prometheus
                          create:
                            description: Whether to create this StorageClass. Defaults to storageClassDefaults.create.
                            type: boolean
                          provisioner:
                            description: Provisioner override for this component.
                            type: string
                          parameters:
                            description: Parameters override for this component.
                            type: object
                            additionalProperties:
                              type: string
                            x-kubernetes-preserve-unknown-fields: true
                          allowVolumeExpansion:
                            description: allowVolumeExpansion override for this component.
                            type: boolean
                          reclaimPolicy:
                            description: Reclaim policy override for this component.
                            type: string
                            enum:
                            - Delete
                            - Retain
                          volumeBindingMode:
                            description: Volume binding mode override for this component.
                            type: string
                            enum:
                            - Immediate
                            - WaitForFirstConsumer
              loki:
                description: Configuration for the Loki component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to loki.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values merged with chart defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  storage:
                    description: Storage configuration for Loki.
                    type: object
                    properties:
                      type:
                        description: Storage backend type. Use "pvc" for PVC-backed filesystem storage, or "s3" for S3 object storage.
                        type: string
                        enum:
                        - pvc
                        - s3
                        default: pvc
                      retentionDays:
                        description: Retention period in days for log data. Applied to Loki limits_config and S3 lifecycle when using S3.
                        type: integer
                        default: 30
                      size:
                        description: Requested PVC size for Loki when type=pvc.
                        type: string
                        default: 10Gi
                      storageClass:
                        description: StorageClass settings for Loki when type=pvc.
                        type: object
                        properties:
                          name:
                            description: StorageClass name for Loki PVCs.
                            type: string
                            default: loki
                          create:
                            description: Whether to create this StorageClass. Defaults to storageClassDefaults.create.
                            type: boolean
                          provisioner:
                            description: Provisioner override for this component.
                            type: string
                          parameters:
                            description: Parameters override for this component.
                            type: object
                            additionalProperties:
                              type: string
                            x-kubernetes-preserve-unknown-fields: true
                          allowVolumeExpansion:
                            description: allowVolumeExpansion override for this component.
                            type: boolean
                          reclaimPolicy:
                            description: Reclaim policy override for this component.
                            type: string
                            enum:
                            - Delete
                            - Retain
                          volumeBindingMode:
                            description: Volume binding mode override for this component.
                            type: string
                            enum:
                            - Immediate
                            - WaitForFirstConsumer
                      s3:
                        description: S3 settings used when type=s3.
                        type: object
                        properties:
                          bucketName:
                            description: S3 bucket name. Defaults to {name}-loki-storage.
                            type: string
                          retentionDays:
                            description: Deprecated. Use storage.retentionDays instead. Falls back to this if storage.retentionDays is not set.
                            type: integer
                            default: 30
              tempo:
                description: Configuration for the Tempo component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to tempo.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values merged with chart and cross-component defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  storage:
                    description: Storage configuration for Tempo.
                    type: object
                    properties:
                      type:
                        description: Storage backend type. Use "pvc" for PVC-backed local storage, or "s3" for S3 object storage.
                        type: string
                        enum:
                        - pvc
                        - s3
                        default: pvc
                      retentionDays:
                        description: Retention period in days for trace data. Applied to Tempo compactor and S3 lifecycle when using S3.
                        type: integer
                        default: 30
                      size:
                        description: Requested PVC size for Tempo when type=pvc.
                        type: string
                        default: 10Gi
                      storageClass:
                        description: StorageClass settings for Tempo when type=pvc.
                        type: object
                        properties:
                          name:
                            description: StorageClass name for Tempo PVCs.
                            type: string
                            default: tempo
                          create:
                            description: Whether to create this StorageClass. Defaults to storageClassDefaults.create.
                            type: boolean
                          provisioner:
                            description: Provisioner override for this component.
                            type: string
                          parameters:
                            description: Parameters override for this component.
                            type: object
                            additionalProperties:
                              type: string
                            x-kubernetes-preserve-unknown-fields: true
                          allowVolumeExpansion:
                            description: allowVolumeExpansion override for this component.
                            type: boolean
                          reclaimPolicy:
                            description: Reclaim policy override for this component.
                            type: string
                            enum:
                            - Delete
                            - Retain
                          volumeBindingMode:
                            description: Volume binding mode override for this component.
                            type: string
                            enum:
                            - Immediate
                            - WaitForFirstConsumer
                      s3:
                        description: S3 settings used when type=s3.
                        type: object
                        properties:
                          bucketName:
                            description: S3 bucket name. Defaults to {name}-tempo-storage.
                            type: string
                          retentionDays:
                            description: Deprecated. Use storage.retentionDays instead. Falls back to this if storage.retentionDays is not set.
                            type: integer
                            default: 30
              k8sMonitoring:
                description: Configuration for the k8s-monitoring component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to k8s-monitoring.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values merged with chart and cross-component defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              grafanaOperator:
                description: Configuration for the Grafana Operator component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to grafana-operator.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values passed to the Grafana Operator chart.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              vpa:
                description: Configuration for the Vertical Pod Autoscaler component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to vpa.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values passed to the VPA chart.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              goldilocks:
                description: Configuration for the Goldilocks component. Monitors all namespaces by default.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to goldilocks.
                    type: string
                  namespace:
                    description: Namespace override for this component.
                    type: string
                  values:
                    description: Helm values merged with chart defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults for this component.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            required:
            - clusterName
            - aws
          status:
            description: ObserveStackStatus defines the observed state.
            type: object
            properties:
              ready:
                description: Overall readiness.
                type: boolean
        required:
        - spec
